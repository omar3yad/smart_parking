<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}نظام الجراج الذكي{% endblock %}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#0f172a; --card:#1e293b; --accent:#22c55e; --text:#e2e8f0; }
  body{ font-family:'Cairo',sans-serif; background:var(--bg); color:var(--text); }
  .navbar{ background:#111827 !important; }
  .card-panel{ background:var(--card); border:1px solid #334155; border-radius:16px; }
  .btn-accent{ background:var(--accent); border:none; color:#052e12; font-weight:700; }
  .btn-accent:hover{ background:#16a34a; color:#fff; }
  .stat-box{ background:var(--card); border-radius:14px; padding:20px; text-align:center; }
  .stat-box h2{ font-weight:900; margin:0; }
  a{ text-decoration:none; }
</style>
</head>
<body>
<nav class="navbar navbar-dark px-4 py-3 d-flex justify-content-between">
  <span class="fw-bold fs-5">🚗 نظام الجراج الذكي</span>
  {% if user.is_authenticated %}
  <div class="d-flex gap-3 align-items-center">
    <a href="{% url 'operator-dashboard' %}" class="text-white">الداشبورد</a>
    <a href="{% url 'entry-gate' %}" class="text-white">بوابة الدخول</a>
    <a href="{% url 'exit-gate' %}" class="text-white">بوابة الخروج</a>
    <span class="text-secondary">{{ user.get_full_name|default:user.username }}</span>
    <a href="{% url 'employee-logout' %}" class="btn btn-sm btn-outline-danger">خروج</a>
  </div>
  {% endif %}
</nav>
<main class="container-fluid p-4">{% block content %}{% endblock %}</main>
</body>
</html>
