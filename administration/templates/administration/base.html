<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Raknatak - نظام الجراج الذكي{% endblock %}</title>
<!-- Font Awesome 6 Icons -->
 <!-- Favicon - أيقونة ركنتك الذكية (شفافة وبحجم واصل لأطراف التاب) -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' stroke='%2338bdf8' stroke-width='2.2' fill='none' stroke-linecap='round' stroke-linejoin='round'><path d='M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2'/><circle cx='7' cy='17' r='2'/><path d='M9 17h6'/><circle cx='17' cy='17' r='2'/></svg>">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<!-- Bootstrap RTL -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">

<!-- Fonts: Cairo for Arabic & Plus Jakarta Sans for English Logo -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Plus+Jakarta+Sans:wght@700;800;900&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --border: #334155;
    --accent: #22c55e;
    --accent-sky: #38bdf8;
    --text: #e2e8f0;
  }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  /* ══════════════ تصميم اللوجو والهيدر ══════════════ */
  .navbar {
    background: #0b1329 !important;
    border-bottom: 1px solid var(--border);
  }

  .logo-brand {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
  }

  .logo-icon-box {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, rgba(56, 189, 248, 0.15) 0%, rgba(34, 197, 94, 0.15) 100%);
    border: 1px solid rgba(56, 189, 248, 0.3);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent-sky);
    box-shadow: 0 0 20px rgba(56, 189, 248, 0.15);
    transition: all 0.3s ease;
  }

  .logo-brand:hover .logo-icon-box {
    transform: scale(1.05);
    border-color: var(--accent-sky);
    box-shadow: 0 0 25px rgba(56, 189, 248, 0.3);
  }

  .logo-text-wrapper {
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .logo-title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800;
    font-size: 1.5rem;
    letter-spacing: -0.5px;
    color: #ffffff;
    line-height: 1;
  }

  .logo-title .gradient-text {
    background: linear-gradient(135deg, var(--accent-sky) 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .logo-subtitle {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.58rem;
    font-weight: 800;
    letter-spacing: 2px;
    color: #64748b;
    margin-top: 3px;
    line-height: 1;
    text-transform: uppercase;
  }

  /* ══════════════ المكونات العامة ══════════════ */
  .nav-link-custom {
    color: #94a3b8;
    font-weight: 600;
    transition: color 0.2s ease;
    text-decoration: none;
  }
  .nav-link-custom:hover {
    color: #f8fafc;
  }

  .card-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
  }

  .btn-accent {
    background: var(--accent);
    border: none;
    color: #052e12;
    font-weight: 700;
  }
  .btn-accent:hover {
    background: #16a34a;
    color: #fff;
  }

  .stat-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    text-align: center;
  }
  .stat-box h2 {
    font-weight: 900;
    margin: 0;
  }
</style>
</head>
<body>

<nav class="navbar navbar-dark px-4 py-2 d-flex justify-content-between align-items-center">
  <!-- اللوجو الاحترافي -->
  <a href="/" class="logo-brand">
    <div class="logo-icon-box">
      <!-- أيقونة سيارة + مكان ركنة ذكي -->
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/>
        <circle cx="7" cy="17" r="2"/>
        <path d="M9 17h6"/>
        <circle cx="17" cy="17" r="2"/>
      </svg>
    </div>
    <div class="logo-text-wrapper">
      <span class="logo-title">Rakne<span class="gradient-text">tak</span></span>
      <span class="logo-subtitle">Smart Parking System</span>
    </div>
  </a>

  <!-- القائمة والتنقل -->
  {% if user.is_authenticated %}
  <div class="d-flex gap-4 align-items-center">
    <a href="{% url 'operator-dashboard' %}" class="nav-link-custom">الداشبورد</a>
    <a href="{% url 'entry-gate' %}" class="nav-link-custom">بوابة الدخول</a>
    <a href="{% url 'exit-gate' %}" class="nav-link-custom">بوابة الخروج</a>
    <span class="badge bg-dark text-secondary border border-secondary px-3 py-2 fs-6">
      👤 {{ user.get_full_name|default:user.username }}
    </span>
    <a href="{% url 'employee-logout' %}" class="btn btn-sm btn-outline-danger px-3">خروج</a>
  </div>
  {% endif %}
</nav>

<main class="container-fluid p-4">
  {% block content %}{% endblock %}
</main>

</body>
</html>
