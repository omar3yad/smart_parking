{% extends "administration/base.html" %}
{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height:80vh;">
  <div class="card-panel p-5" style="width:100%;max-width:420px;">
    <h3 class="text-center mb-4 fw-bold">تسجيل دخول الموظف</h3>
    {% if form.non_field_errors %}<div class="alert alert-danger">{{ form.non_field_errors }}</div>{% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="mb-3"><label class="form-label">{{ form.username.label }}</label>{{ form.username }}</div>
      <div class="mb-3"><label class="form-label">{{ form.password.label }}</label>{{ form.password }}</div>
      <button type="submit" class="btn btn-accent w-100 py-2 mt-2">دخول</button>
    </form>
  </div>
</div>
{% endblock %}
